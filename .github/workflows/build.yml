name: mcMMO Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      mc_version: ${{ steps.check.outputs.mc_version }}
      java_version: ${{ steps.check.outputs.java_version }}
      latest_paper: ${{ steps.check.outputs.latest_paper }}
      latest_folia: ${{ steps.check.outputs.latest_folia }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git ls-remote https://github.com/mcMMO-Dev/mcMMO.git HEAD | cut -f1)
          SHORT=${SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT

          if gh release view "build-$SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          curl -fsSL https://raw.githubusercontent.com/mcMMO-Dev/mcMMO/master/pom.xml -o /tmp/pom.xml
          POM=$(python3 -c "import re; c=open('/tmp/pom.xml').read(); print(re.sub(r'<!--.*?-->','',c,flags=re.DOTALL))")

          MC_VERSION=$(echo "$POM" | python3 -c "import sys,re; c=sys.stdin.read(); m=re.search(r'<spigot\.version>([^<]+)</spigot\.version>',c); v=m.group(1) if m else ''; mc=re.match(r'\d+\.\d+(\.\d+)?',v); print(mc.group(0) if mc else '')")
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

          JAVA_VERSION=$(echo "$POM" | python3 -c "import sys,re; c=sys.stdin.read(); m=re.search(r'<java\.version>([^<]+)</java\.version>',c); print(m.group(1).strip() if m else '17')")
          echo "java_version=$JAVA_VERSION" >> $GITHUB_OUTPUT

          curl -fsSL "https://api.papermc.io/v2/projects/paper" -o /tmp/paper-versions.json
          LATEST_PAPER=$(python3 -c "import json; vs=json.load(open('/tmp/paper-versions.json'))['versions']; print(vs[-1])")
          echo "latest_paper=$LATEST_PAPER" >> $GITHUB_OUTPUT

          curl -fsSL "https://api.papermc.io/v2/projects/folia" -o /tmp/folia-versions.json
          LATEST_FOLIA=$(python3 -c "import json; vs=json.load(open('/tmp/folia-versions.json'))['versions']; print(vs[-1])")
          echo "latest_folia=$LATEST_FOLIA" >> $GITHUB_OUTPUT

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout mcMMO
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: mcMMO-Dev/mcMMO
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ needs.check.outputs.java_version }}
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: mv target/mcMMO.jar "target/mcMMO-${VERSION}+${SHORT_SHA}.jar"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plugin-jar
          path: target/mcMMO-*.jar

      - name: Upload pom.xml
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pom-xml
          path: pom.xml

  paper-smoke-test:
    name: Paper Smoke Test
    runs-on: ubuntu-latest
    needs: [check, build]
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve latest Paper build
        id: paper
        run: |
          curl -fsSL "https://api.papermc.io/v2/projects/paper" -o /tmp/paper-versions.json
          MC_VERSION=$(python3 -c "import json; vs=json.load(open('/tmp/paper-versions.json'))['versions']; print(vs[-1])")

          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds" -o /tmp/paper-builds.json
          BUILD=$(python3 -c "import json; builds=json.load(open('/tmp/paper-builds.json'))['builds']; stable=[b for b in builds if b.get('channel','')=='default']; chosen=(stable or builds)[-1]; print(chosen['build'])")

          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${BUILD}" -o /tmp/paper-build.json
          JAR_NAME=$(python3 -c "import json; d=json.load(open('/tmp/paper-build.json')); print(d['downloads']['application']['name'])")
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"           >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}"     >> "$GITHUB_OUTPUT"
          echo "Resolved: Paper ${MC_VERSION} build ${BUILD} (${JAR_NAME})"

      - name: Download Paper server JAR
        env:
          MC_VERSION: ${{ steps.paper.outputs.mc_version }}
          BUILD: ${{ steps.paper.outputs.build }}
          JAR_NAME: ${{ steps.paper.outputs.jar_name }}
        run: |
          mkdir -p smoke-server/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" -o smoke-server/paper.jar

      - name: Detect required Java version
        id: java_ver
        env:
          MC_VERSION: ${{ steps.paper.outputs.mc_version }}
        run: |
          REQUIRED=$(python3 -c "
          import re, os
          v = os.environ.get('MC_VERSION', '1.21')
          parts = [int(x) for x in re.split(r'\.', v) if x.isdigit()]
          major, minor = (parts + [0, 0])[:2]
          print(21 if major >= 25 or (major == 1 and minor >= 21) else 17 if major == 1 and minor >= 17 else 11)
          ")
          echo "MC ${MC_VERSION} -> Java ${REQUIRED}"
          echo "version=${REQUIRED}" >> "$GITHUB_OUTPUT"

      - name: Set up required JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ steps.java_ver.outputs.version }}
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/mcMMO-*.jar smoke-server/plugins/mcMMO.jar

      - name: Configure server
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf '%s\n' "online-mode=false" "level-type=flat" "generate-structures=false" "max-players=0" > smoke-server/server.properties

      - name: Run server and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar paper.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Server ready after ${ELAPSED}s"; break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited after ${ELAPSED}s"; break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert no mcMMO errors
        run: |
          LOG=smoke-server/server.log
          if grep -qiE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"; then
            echo "::error::mcMMO logged errors on Paper startup:"
            grep -iE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Paper smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: paper-smoke-log
          path: smoke-server/server.log
          retention-days: 7

  folia-smoke-test:
    name: Folia Smoke Test
    runs-on: ubuntu-latest
    needs: [check, build]
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve latest Folia build
        id: folia
        run: |
          curl -fsSL "https://api.papermc.io/v2/projects/folia" -o /tmp/folia-versions.json
          MC_VERSION=$(python3 -c "import json; vs=json.load(open('/tmp/folia-versions.json'))['versions']; print(vs[-1])")

          curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds" -o /tmp/folia-builds.json
          BUILD=$(python3 -c "import json; builds=json.load(open('/tmp/folia-builds.json'))['builds']; stable=[b for b in builds if b.get('channel','')=='default']; chosen=(stable or builds)[-1]; print(chosen['build'])")

          curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds/${BUILD}" -o /tmp/folia-build.json
          JAR_NAME=$(python3 -c "import json; d=json.load(open('/tmp/folia-build.json')); print(d['downloads']['application']['name'])")
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"           >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}"     >> "$GITHUB_OUTPUT"
          echo "Resolved: Folia ${MC_VERSION} build ${BUILD} (${JAR_NAME})"

      - name: Download Folia server JAR
        env:
          MC_VERSION: ${{ steps.folia.outputs.mc_version }}
          BUILD: ${{ steps.folia.outputs.build }}
          JAR_NAME: ${{ steps.folia.outputs.jar_name }}
        run: |
          mkdir -p smoke-server/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" -o smoke-server/folia.jar

      - name: Detect required Java version
        id: java_ver
        env:
          MC_VERSION: ${{ steps.folia.outputs.mc_version }}
        run: |
          REQUIRED=$(python3 -c "
          import re, os
          v = os.environ.get('MC_VERSION', '1.21')
          parts = [int(x) for x in re.split(r'\.', v) if x.isdigit()]
          major, minor = (parts + [0, 0])[:2]
          print(21 if major >= 25 or (major == 1 and minor >= 21) else 17 if major == 1 and minor >= 17 else 11)
          ")
          echo "MC ${MC_VERSION} -> Java ${REQUIRED}"
          echo "version=${REQUIRED}" >> "$GITHUB_OUTPUT"

      - name: Set up required JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ steps.java_ver.outputs.version }}
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/mcMMO-*.jar smoke-server/plugins/mcMMO.jar

      - name: Configure server
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf '%s\n' "online-mode=false" "level-type=flat" "generate-structures=false" "max-players=0" > smoke-server/server.properties

      - name: Run server and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar folia.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Server ready after ${ELAPSED}s"; break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited after ${ELAPSED}s"; break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert no mcMMO errors
        run: |
          LOG=smoke-server/server.log
          if grep -qiE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"; then
            echo "::error::mcMMO logged errors on Folia startup:"
            grep -iE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Folia smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: folia-smoke-log
          path: smoke-server/server.log
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [check, build, paper-smoke-test, folia-smoke-test]
    permissions:
      contents: write
      actions: read
      attestations: write
      id-token: write
      packages: write
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Download pom.xml
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pom-xml
          path: plugin-jar/

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          cat > /tmp/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          XML
          JAR=$(ls plugin-jar/mcMMO-*.jar)
          DEPLOY_VERSION="${VERSION%-SNAPSHOT}-${SHORT_SHA}"
          mvn deploy:deploy-file \
            -Dfile="$JAR" \
            -DpomFile=plugin-jar/pom.xml \
            -Dversion="$DEPLOY_VERSION" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/${{ github.repository }} \
            -s /tmp/settings.xml \
            -e

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: plugin-jar/mcMMO-*.jar

      - name: Copy provenance bundle for release
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          JAR=$(ls plugin-jar/mcMMO-*.jar | head -1)
          cp "$BUNDLE_PATH" "${JAR}.intoto.jsonl"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign JAR
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          JAR=$(ls plugin-jar/mcMMO-*.jar)
          cosign sign-blob --yes --bundle "${JAR}.sigstore.json" "$JAR"

      - name: Generate release notes
        env:
          SHA: ${{ needs.check.outputs.sha }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
          VERSION: ${{ needs.build.outputs.version }}
          MC_VERSION: ${{ needs.check.outputs.mc_version }}
          LATEST_PAPER: ${{ needs.check.outputs.latest_paper }}
          LATEST_FOLIA: ${{ needs.check.outputs.latest_folia }}
        run: |
          printf 'Built from upstream master @ [%s](https://github.com/mcMMO-Dev/mcMMO/commit/%s)\n\n| Platform | Compatible versions |\n|----------|---------------------|\n| Paper | %s – %s |\n| Folia | %s – %s |\n\n**Verify the JAR:**\n```sh\ngh attestation verify mcMMO-${VERSION}+${SHORT_SHA}.jar --repo ${{ github.repository }}\n```\n' \
            "$SHORT_SHA" "$SHA" "$MC_VERSION" "$LATEST_PAPER" "$MC_VERSION" "$LATEST_FOLIA" > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: build-${{ needs.check.outputs.short_sha }}
          name: mcMMO ${{ needs.build.outputs.version }} (${{ needs.check.outputs.short_sha }})
          body_path: release-notes.md
          files: |
            plugin-jar/mcMMO-*.jar
            plugin-jar/mcMMO-*.jar.sigstore.json
            plugin-jar/mcMMO-*.jar.intoto.jsonl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
