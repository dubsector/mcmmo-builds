name: mcMMO Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git ls-remote https://github.com/mcMMO-Dev/mcMMO.git HEAD | cut -f1)
          SHORT=${SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT

          if gh release view "build-$SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout mcMMO
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: mcMMO-Dev/mcMMO
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: mv target/mcMMO.jar "target/mcMMO-${VERSION}+${SHORT_SHA}.jar"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.check.outputs.sha }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: |
          gh release create "build-${SHORT_SHA}" \
            --repo ${{ github.repository }} \
            --title "mcMMO ${VERSION} (${SHORT_SHA})" \
            --notes "Built from upstream master @ \`${SHA}\`" \
            target/mcMMO-*.jar
