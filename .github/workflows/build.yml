name: mcMMO Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git ls-remote https://github.com/mcMMO-Dev/mcMMO.git HEAD | cut -f1)
          SHORT=${SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT

          if gh release view "build-$SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout mcMMO
        uses: actions/checkout@v4
        with:
          repository: mcMMO-Dev/mcMMO

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        run: mv target/mcMMO.jar target/mcMMO-${{ steps.ver.outputs.version }}+${{ needs.check.outputs.short_sha }}.jar

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ needs.check.outputs.short_sha }}
          name: mcMMO ${{ steps.ver.outputs.version }} (${{ needs.check.outputs.short_sha }})
          prerelease: false
          body: |
            Built from upstream master @ `${{ needs.check.outputs.sha }}`
          files: target/mcMMO-*.jar
