name: mcMMO Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      mc_version: ${{ steps.check.outputs.mc_version }}
      latest_paper: ${{ steps.check.outputs.latest_paper }}
      latest_folia: ${{ steps.check.outputs.latest_folia }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git ls-remote https://github.com/mcMMO-Dev/mcMMO.git HEAD | cut -f1)
          SHORT=${SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT

          if gh release view "build-$SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          MC_VERSION=$(curl -fsSL https://raw.githubusercontent.com/mcMMO-Dev/mcMMO/master/pom.xml | python3 -c "import sys,re; c=sys.stdin.read(); c=re.sub(r'<!--.*?-->','',c,flags=re.DOTALL); m=re.search(r'<spigot\.version>([^<]+)</spigot\.version>',c); v=m.group(1) if m else ''; mc=re.match(r'\d+\.\d+(\.\d+)?',v); print(mc.group(0) if mc else '')")
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

          LATEST_PAPER=$(curl -fsSL "https://api.papermc.io/v2/projects/paper" | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          echo "latest_paper=$LATEST_PAPER" >> $GITHUB_OUTPUT

          LATEST_FOLIA=$(curl -fsSL "https://api.papermc.io/v2/projects/folia" | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          echo "latest_folia=$LATEST_FOLIA" >> $GITHUB_OUTPUT

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout mcMMO
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: mcMMO-Dev/mcMMO
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: mv target/mcMMO.jar "target/mcMMO-${VERSION}+${SHORT_SHA}.jar"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin-jar
          path: target/mcMMO-*.jar

  paper-smoke-test:
    name: Paper Smoke Test
    runs-on: ubuntu-latest
    needs: [check, build]
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve latest Paper build
        id: paper
        run: |
          MC_VERSION=$(curl -fsSL "https://api.papermc.io/v2/projects/paper" | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds" | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; print(builds[-1]['build'])")
          JAR_NAME=$(curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${BUILD}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['downloads']['application']['name'])")
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"           >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}"     >> "$GITHUB_OUTPUT"
          echo "Resolved: Paper ${MC_VERSION} build ${BUILD} (${JAR_NAME})"

      - name: Download Paper server JAR
        env:
          MC_VERSION: ${{ steps.paper.outputs.mc_version }}
          BUILD: ${{ steps.paper.outputs.build }}
          JAR_NAME: ${{ steps.paper.outputs.jar_name }}
        run: |
          mkdir -p smoke-server/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" -o smoke-server/paper.jar

      - name: Detect required Java version
        id: java_ver
        run: |
          REQUIRED=$(unzip -p smoke-server/paper.jar org/bukkit/craftbukkit/Main.class 2>/dev/null | python3 -c "import sys; d=sys.stdin.buffer.read(); print(int.from_bytes(d[6:8],'big') - 44)" 2>/dev/null || echo "17")
          echo "Detected required Java: ${REQUIRED}"
          echo "version=${REQUIRED}" >> "$GITHUB_OUTPUT"

      - name: Set up required JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ steps.java_ver.outputs.version }}
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/mcMMO-*.jar smoke-server/plugins/mcMMO.jar

      - name: Configure server
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf '%s\n' "online-mode=false" "level-type=flat" "generate-structures=false" "max-players=0" > smoke-server/server.properties

      - name: Run server and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar paper.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Server ready after ${ELAPSED}s"; break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited after ${ELAPSED}s"; break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert no mcMMO errors
        run: |
          LOG=smoke-server/server.log
          if grep -qiE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"; then
            echo "::error::mcMMO logged errors on Paper startup:"
            grep -iE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Paper smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: paper-smoke-log
          path: smoke-server/server.log
          retention-days: 7

  folia-smoke-test:
    name: Folia Smoke Test
    runs-on: ubuntu-latest
    needs: [check, build]
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve latest Folia build
        id: folia
        run: |
          MC_VERSION=$(curl -fsSL "https://api.papermc.io/v2/projects/folia" | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds" | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; print(builds[-1]['build'])")
          JAR_NAME=$(curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds/${BUILD}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['downloads']['application']['name'])")
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"           >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}"     >> "$GITHUB_OUTPUT"
          echo "Resolved: Folia ${MC_VERSION} build ${BUILD} (${JAR_NAME})"

      - name: Download Folia server JAR
        env:
          MC_VERSION: ${{ steps.folia.outputs.mc_version }}
          BUILD: ${{ steps.folia.outputs.build }}
          JAR_NAME: ${{ steps.folia.outputs.jar_name }}
        run: |
          mkdir -p smoke-server/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/folia/versions/${MC_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" -o smoke-server/folia.jar

      - name: Detect required Java version
        id: java_ver
        run: |
          REQUIRED=$(unzip -p smoke-server/folia.jar org/bukkit/craftbukkit/Main.class 2>/dev/null | python3 -c "import sys; d=sys.stdin.buffer.read(); print(int.from_bytes(d[6:8],'big') - 44)" 2>/dev/null || echo "17")
          echo "Detected required Java: ${REQUIRED}"
          echo "version=${REQUIRED}" >> "$GITHUB_OUTPUT"

      - name: Set up required JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ steps.java_ver.outputs.version }}
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/mcMMO-*.jar smoke-server/plugins/mcMMO.jar

      - name: Configure server
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf '%s\n' "online-mode=false" "level-type=flat" "generate-structures=false" "max-players=0" > smoke-server/server.properties

      - name: Run server and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar folia.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Server ready after ${ELAPSED}s"; break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited after ${ELAPSED}s"; break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert no mcMMO errors
        run: |
          LOG=smoke-server/server.log
          if grep -qiE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"; then
            echo "::error::mcMMO logged errors on Folia startup:"
            grep -iE "SEVERE.*mcMMO|Could not load.*mcMMO|Error.*mcMMO|mcMMO.*FAILED" "$LOG"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Folia smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: folia-smoke-log
          path: smoke-server/server.log
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [check, build, paper-smoke-test, folia-smoke-test]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.check.outputs.sha }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
          VERSION: ${{ needs.build.outputs.version }}
          MC_VERSION: ${{ needs.check.outputs.mc_version }}
          LATEST_PAPER: ${{ needs.check.outputs.latest_paper }}
          LATEST_FOLIA: ${{ needs.check.outputs.latest_folia }}
        run: |
          printf 'Built from upstream master @ `%s`\n\n| Platform | Compatible versions |\n|----------|---------------------|\n| Paper | %s – %s |\n| Folia | %s – %s |\n' \
            "$SHA" "$MC_VERSION" "$LATEST_PAPER" "$MC_VERSION" "$LATEST_FOLIA" > release-notes.md

          gh release create "build-${SHORT_SHA}" \
            --repo ${{ github.repository }} \
            --title "mcMMO ${VERSION} (${SHORT_SHA})" \
            --notes-file release-notes.md \
            plugin-jar/mcMMO-*.jar
